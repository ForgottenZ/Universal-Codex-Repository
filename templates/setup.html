{% extends "base.html" %}
{% block content %}
<div class="card">
  <h1 class="h1">初始化管理员账户</h1>
  <p class="muted">第一次启动需要创建管理员账号。</p>

  <form method="post" class="form">
    <label class="label">用户名</label>
    <input class="input" type="text" name="username" placeholder="至少 3 个字符" required />

    <label class="label">密码</label>
    <input class="input" type="password" name="password" placeholder="至少 6 个字符" required />

    <div class="row">
      <button class="btn" type="submit">创建管理员</button>
    </div>
  </form>
</div>
{% endblock %}
